<!DOCTYPE html>
<html lang="en" data-theme="dark">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
        <meta name="description" content="William Nayar's Personal Webpage">
        <meta name="google-site-verification" content="lL632B8-tNJC8M56GPNNgdphLKLm4ni7_yQzqSJJF1g">

        <!-- https://getbootstrap.com/docs/5.3/getting-started/introduction/ -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous"></script>
        
        <!-- https://favicon.io/emoji-favicons/bow-and-arrow -->
        <link href="/static/favicon.ico" rel="icon">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400..700;1,400&display=swap" rel="stylesheet">

        <link href="/static/style.css" rel="stylesheet">

        <script>
            (function () {
                try {
                    var k = "wn-site-theme";
                    var t = sessionStorage.getItem(k);
                    if (t !== "light" && t !== "dark") t = "dark";
                    document.documentElement.setAttribute("data-theme", t);
                    var nav = document.querySelector("nav.site-navbar");
                    if (nav) {
                        nav.classList.remove("navbar-dark", "navbar-light");
                        nav.classList.add(t === "light" ? "navbar-light" : "navbar-dark");
                    }
                } catch (e) {}
            })();
        </script>

        {% block extrahead %}{% endblock %}

        <!-- https://github.com/mattboldt/typed.js/ -->
        <script src="https://unpkg.com/typed.js@2.0.16/dist/typed.umd.js"></script>

        <style>
            /* Smooth scroll behavior */
            html {
                scroll-behavior: smooth;
            }
            .nav-link {
                transition: color 0.3s ease;
            }
            .nav-link:hover {
                color: #14b8a6 !important;
            }
            .navbar-brand {
                transition: color 0.3s ease;
            }
            .navbar-brand:hover {
                color: #14b8a6 !important;
            }
            /* Global link hover effects */
            a {
                transition: all 0.3s ease;
            }
            a.gold:hover {
                color: #fde68a !important;
                text-decoration: underline;
            }
            /* Motion limited to interactive controls; body links stay stable */
            .fade-in-section {
                opacity: 0;
                transform: translateY(12px);
                transition: opacity 0.45s ease-out, transform 0.45s ease-out;
            }
            .fade-in-section.is-visible {
                opacity: 1;
                transform: translateY(0);
            }
            /* Button click feedback */
            .explore-button:active, .project-button:active, .buttoninsights:active {
                transform: scale(0.97) !important;
                transition: transform 0.1s ease;
            }
            /* Mobile responsive padding */
            /* Mobile body copy ≈ Projects intro (.case-body): 1rem / comfortable line-height */
            @media (max-width: 768px) {
                .centertext2, .blog-content, .guide-card {
                    padding-left: 5% !important;
                    padding-right: 5% !important;
                    font-size: 1rem !important;
                    line-height: 1.65 !important;
                }
                .centertext2new {
                    padding-left: 3% !important;
                    padding-right: 3% !important;
                    font-size: 1rem !important;
                    line-height: 1.65 !important;
                }
                .centertext1, .centertext1new {
                    padding-left: 5% !important;
                    padding-right: 5% !important;
                    text-align: left !important;
                }
                .centertext2new li {
                    margin-left: 0 !important;
                    padding-left: 0 !important;
                    list-style-position: inside;
                }
                .aboutme2 h2, .aboutme2 h3 {
                    font-size: 1.125rem !important;
                    line-height: 1.35 !important;
                }
            }
        </style>

        <title>William Nayar {% block title %}{% endblock %} </title>
    </head>
    <body class="layoutbody">
        <nav class="navbar navbar-dark navbar-expand-md site-navbar">
            <div class="container-fluid">
                <a class="navbar-brand" href="/">William</a>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item"><a class="nav-link {% if request.path.startswith('/projects') %}active fw-semibold{% endif %}" {% if request.path.startswith('/projects') %}aria-current="page"{% endif %} href="/projects">Projects</a></li>
                        <li class="nav-item"><a class="nav-link {% if request.path.startswith('/guides') %}active fw-semibold{% endif %}" {% if request.path.startswith('/guides') %}aria-current="page"{% endif %} href="/guides">Guides</a></li>
                        <li class="nav-item"><a class="nav-link {% if request.path.startswith('/philosophy') %}active fw-semibold{% endif %}" {% if request.path.startswith('/philosophy') %}aria-current="page"{% endif %} href="/philosophy">Philosophy</a></li>
                    </ul>
                </div>
                <div class="d-flex align-items-center gap-2 flex-shrink-0">
                    <button type="button" class="theme-toggle" id="theme-toggle" title="Light mode" aria-label="Switch to light mode">
                        <span class="theme-icon" data-theme-icon="light" aria-hidden="true">☀️</span>
                        <span class="theme-icon" data-theme-icon="dark" hidden aria-hidden="true">🌙</span>
                    </button>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                </div>
            </div>
        </nav>
        {% block main %}{% endblock %}
        <script src="/static/theme.js"></script>
        <script>
            // Smooth scroll fade-in effect
            const fadeInSections = document.querySelectorAll('.fade-in-section');
            
            const fadeInObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('is-visible');
                    }
                });
            }, {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            });
            
            fadeInSections.forEach(section => {
                fadeInObserver.observe(section);
            });
        </script>
    </body>
</html>
